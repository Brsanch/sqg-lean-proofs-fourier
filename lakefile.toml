name = "fourier_analysis"
version = "0.1.0"
keywords = ["math", "fourier", "analysis"]
defaultTargets = ["FourierAnalysis"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "FourierAnalysis"
